# Build and publish the DiagnosticExplorer container image to GitHub
# Container Registry (ghcr.io/<owner>/<repo>).
#
# Triggers:
#   - push to main                       -> publish, tagged `latest` + `sha-<short>` + `main`
#   - push of a v*.*.* git tag           -> publish, tagged with the semver
#   - workflow_dispatch                  -> publish on demand from any ref
#   - pull_request against main          -> build only (no push) to validate
#                                           the Dockerfile / SPA build still works
#
# Authentication: the built-in GITHUB_TOKEN with `packages: write` permission;
# no external secrets required.
#
# Image lives at: ghcr.io/${{ github.repository_owner }}/diagnostic-explorer
# Visibility inherits the source repo on first publish (public repo ->
# public package, private repo -> private package). Override at any
# time from the package's settings page on GitHub.

name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/diagnostic-explorer

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Docker/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
